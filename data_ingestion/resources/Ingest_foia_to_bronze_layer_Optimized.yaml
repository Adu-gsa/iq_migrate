          depends_on:
            - task_key: Ingest_foia_item_xref_table
          python_wheel_task:
            package_name: data_ingestion
            entry_point: bronze_to_silver_ingestion
            parameters:
              --job_id "{{job.id}}"
              --task_id "{{task.name}}"
              --task_run_id "{{task.run_id}}"
              --job_run_id "{{job.run_id}}"
              --fail_on_cast_errors false
              --cast_error_max_rows 0
              --cast_error_max_pct 0
          job_cluster_key: Job_cluster
      job_clusters:
        - job_cluster_key: Job_cluster
          new_cluster:
            cluster_name: ""
            spark_version: "${var.spark_version}"
            aws_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK
              zone_id: auto
              spot_bid_price_percent: 100
              ebs_volume_type: GENERAL_PURPOSE_SSD
              ebs_volume_count: 3
              ebs_volume_size: 100
            node_type_id: "${var.node_type_id}"
            custom_tags:
              WORKSPACE: "${var.custom_tags.WORKSPACE}"
            enable_elastic_disk: true
            policy_id: "${var.cluster_policy}"
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            kind: CLASSIC_PREVIEW
            is_single_node: false
            num_workers: 4
      queue:
        enabled: true
      parameters:
        - name: env
          default: test
      run_as:
        service_principal_name: "${var.service_principal_name}"

