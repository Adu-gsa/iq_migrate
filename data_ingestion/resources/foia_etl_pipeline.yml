            named_parameters:
              table_name: catalog_832
              job_run_id: "{{job.run_id}}"
              job_id: "{{job.id}}"
              run_mode: single
              fail_fast: "true"
              schema: bronze
              task_id: "{{task.name}}"
              task_run_id: "{{task.run_id}}"
              env: "{{job.parameters.env}}"
          job_cluster_key: Job_cluster
          libraries:
            - whl: ${var.whl_path}
        - task_key: Ingest_foia_sin_limit_table
