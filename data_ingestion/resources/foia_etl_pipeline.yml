resources:
  jobs:
    Ingest_foia_to_bronze_layer:
      name: Ingest_foia_to_bronze_layer
      email_notifications:
        no_alert_for_skipped_runs: true
      notification_settings:
        no_alert_for_skipped_runs: true
        no_alert_for_canceled_runs: true
      tasks:
        - task_key: Ingest_foia_gsin_hide_remove_table
          python_wheel_task:
            package_name: data_ingestion
            entry_point: ingest_table_dispatcher
            named_parameters:
              table_name: gsin_hide_remove
              job_run_id: "{{job.run_id}}"
              job_id: "{{job.id}}"
              run_mode: single
              fail_fast: "true"
              schema: bronze
              task_id: "{{task.name}}"
              task_run_id: "{{task.run_id}}"
              env: "{{job.parameters.env}}"
          job_cluster_key: Job_cluster
          libraries:
            - whl: ${var.whl_path}
        - task_key: Ingest_foia_gsin_hide_remove_hist_table
          depends_on:
            - task_key: Ingest_foia_gsin_hide_remove_table
