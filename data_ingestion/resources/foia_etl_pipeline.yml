          job_cluster_key: Job_cluster
          libraries:
            - whl: ${var.whl_path}
        - task_key: Ingest_foia_bpa_header_table
          depends_on:
            - task_key: Ingest_foia_suspend_contract_table
          python_wheel_task:
            package_name: data_ingestion
            entry_point: ingest_table_dispatcher
            named_parameters:
              table_name: bpa_header
              job_run_id: "{{job.run_id}}"
              job_id: "{{job.id}}"
              run_mode: single
              fail_fast: "true"
              schema: bronze
              task_id: "{{task.name}}"
              task_run_id: "{{task.run_id}}"
              env: "{{job.parameters.env}}"
          job_cluster_key: Job_cluster
          libraries:
            - whl: ${var.whl_path}
        - task_key: Ingest_foia_bpa_item_table
          depends_on:
            - task_key: Ingest_foia_bpa_header_table
          python_wheel_task:
            package_name: data_ingestion
            entry_point: ingest_table_dispatcher
            named_parameters:
              table_name: bpa_item
              job_run_id: "{{job.run_id}}"
              job_id: "{{job.id}}"
              run_mode: single
              fail_fast: "true"
              schema: bronze
              task_id: "{{task.name}}"
              task_run_id: "{{task.run_id}}"
              env: "{{job.parameters.env}}"
          job_cluster_key: Job_cluster
          libraries:
            - whl: ${var.whl_path}
        - task_key: Ingest_foia_bpa_item_price_table
          depends_on:
            - task_key: Ingest_foia_suspend_contract_table
          python_wheel_task:
            package_name: data_ingestion
            entry_point: ingest_table_dispatcher
            named_parameters:
              table_name: bpa_item_price
              job_run_id: "{{job.run_id}}"
              job_id: "{{job.id}}"
              run_mode: single
              fail_fast: "true"
              schema: bronze
              task_id: "{{task.name}}"
              task_run_id: "{{task.run_id}}"
              env: "{{job.parameters.env}}"
          job_cluster_key: Job_cluster
          libraries:
            - whl: ${var.whl_path}
        - task_key: Ingest_foia_price_discount_table
          depends_on:
            - task_key: Ingest_foia_bpa_item_price_table
          python_wheel_task:
            package_name: data_ingestion
            entry_point: ingest_table_dispatcher
            named_parameters:
              table_name: price_discount
              job_run_id: "{{job.run_id}}"
              job_id: "{{job.id}}"
              run_mode: single
