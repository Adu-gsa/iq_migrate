# DAB variable declarations for the data_ingestion bundle.
# This file is included by databricks.yml via the include directive.
# Per-environment values are set in the targets block below and merged
# with the infrastructure config in databricks.yml at bundle resolution time.

variables:
  catalog:
    description: Unity Catalog name for the target environment
  s3_bucket:
    description: S3 bucket for data ingestion storage
  cluster_policy:
    description: Cluster policy ID
  service_principal_name:
    description: Service principal UUID used as run_as for ETL jobs
  deployer_service_principal:
    description: Service principal UUID used by CI/CD to deploy the asset bundle
  email_recipients:
    description: Comma-separated email recipients for job status notifications
  workspace_tag:
    description: Value for the WORKSPACE custom cluster tag
  bronze_schema:
    description: Bronze layer schema name
    default: bronze
  silver_schema:
    description: Silver layer schema name
    default: silver
  node_type_id:
    description: Worker node instance type
    default: r5n.2xlarge
  spark_version:
    description: Databricks runtime version
    default: 17.3.x-scala2.13
  wheel_version:
    description: Wheel file version to deploy — bump here to roll out a new build
    default: "0.1.0"
  min_workers:
    description: Minimum number of autoscale workers for the job cluster
  max_workers:
    description: Maximum number of autoscale workers for the job cluster

