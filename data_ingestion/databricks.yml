# Databricks Asset Bundle — data_ingestion
bundle:
  name: data_ingestion

presets:
  tags:
    project: foia_data_ingestion

sync:
  # Wheel-based project: only the bundle config needs to reach the workspace.
  # All Python code is packaged into the wheel and uploaded to UC Volumes separately.
  paths:
    - ./databricks.yml
  exclude:
    # Python build outputs
    - build/**
    - dist/**
    - src/**
    - "src/**/*.egg-info/**"
    # Python packaging config (not needed at runtime)
    - setup.py
    - pyproject.toml
    - MANIFEST.in
    # Reference / documentation files
    - README.md
    - sample_databricks.yml
    - Ingest_foia_to_bronze_layer_Optimized_v3.yaml
    # Python bytecode cache
    - "**/__pycache__/**"
    - "**/*.pyc"
    # Tooling and OS metadata
    - "**/.databricks/**"
    - "**/.DS_Store"
    - "**/.git/**"
    - "**/.vscode/**"
    - "**/.github/**"

include:
  - resources/foia_etl_pipeline.yml
  - resources/variables.yaml

artifacts:
  data_ingestion_whl:
    type: whl
    path: .
    build: pip wheel . --no-deps -w dist

permissions:
  - user_name: adugna.erena@gsa.gov
    level: CAN_MANAGE

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://gsa-fas-advantage-np.cloud.databricks.com
      root_path: /Shared/.bundle/${bundle.name}/dev
    permissions:
      - service_principal_name: svc_fas_advantage_foia_etl_user_dev
        level: CAN_MANAGE
      - service_principal_name: svc_fas_advantage_foia_deployer_dev
        level: CAN_MANAGE
      - user_name: adugna.erena@gsa.gov
        level: CAN_MANAGE

  test:
    mode: development
    workspace:
      host: https://gsa-fas-advantage-np.cloud.databricks.com
      root_path: /Shared/.bundle/${bundle.name}/test
    permissions:
      - service_principal_name: svc_fas_advantage_foia_etl_user_tst
        level: CAN_MANAGE
      - service_principal_name: svc_fas_advantage_foia_deployer_tst
        level: CAN_MANAGE
      - user_name: adugna.erena@gsa.gov
        level: CAN_MANAGE

  prod:
    mode: production
    workspace:
      host: https://gsa-fas-advantage.cloud.databricks.com
      root_path: /Shared/.bundle/${bundle.name}/prod
    presets:
      trigger_pause_status: UNPAUSED
    permissions:
      - service_principal_name: svc_fas_advantage_foia_etl_user_prd
        level: CAN_MANAGE
      - service_principal_name: svc_fas_advantage_foia_deployer_prd
        level: CAN_MANAGE
      - user_name: adugna.erena@gsa.gov
        level: CAN_MANAGE
